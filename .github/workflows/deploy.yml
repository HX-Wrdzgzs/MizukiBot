name: Deploy to Cloudflare Pages

# 触发条件：当主分支有代码推送时执行
on:
  push:
    branches:
      - main  # 如果你的默认分支是 master，请改为 master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # VitePress 需要完整的 Git 历史来生成页面的“最后更新时间”

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 推荐使用 Node 20

      - name: Install dependencies
        # 如果你使用的是 pnpm 或 yarn，请修改这里的安装命令
        run: npm install

      - name: Build VitePress site
        # 你的 VitePress 构建命令
        run: npm run docs:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: mizuki-bot-docs # ⚠️ 改成你在 Cloudflare Pages 创建的项目名称
          directory: docs/.vitepress/dist # VitePress 默认的输出目录
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
